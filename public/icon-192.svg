<svg xmlns="http://www.w3.org/2000/svg" width="192" height="192" viewBox="0 0 192 192">
  <rect width="192" height="192" rx="40" fill="#111111"/>
  <!-- Dumbbell - thick rounded stroke style -->
  <g fill="none" stroke="#F97316" stroke-width="10" stroke-linecap="round" stroke-linejoin="round">
    <!-- Bar -->
    <line x1="46" y1="76" x2="146" y2="76"/>
    <!-- Left weight -->
    <rect x="34" y="52" width="24" height="48" rx="8"/>
    <!-- Right weight -->
    <rect x="134" y="52" width="24" height="48" rx="8"/>
  </g>
  <!-- BP text - smaller, matching dumbbell width -->
  <text x="96" y="148" text-anchor="middle" font-family="sans-serif" font-weight="800" font-size="36" letter-spacing="8" fill="#F97316">BP</text>
</svg>
